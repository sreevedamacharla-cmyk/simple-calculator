<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h3>Calculator</h3>
      <div class="displaymain">
        <div class="display"></div>
        <div class="displayresult"></div>
      </div>
      <div class="row1">
        <button id="clearbtn">AC</button>
        <button id="exponentbtn">**</button>
        <button id="percentbtn">%</button>
        <button id="divisionbtn">/</button>
      </div>
      <div class="row2">
        <button id="btn7">7</button>
        <button id="btn8">8</button>
        <button id="btn9">9</button>
        <button id="multiplybtn">*</button>
      </div>
      <div class="row3">
        <button id="btn4">4</button>
        <button id="btn5">5</button>
        <button id="btn6">6</button>
        <button id="subtractbtn">-</button>
      </div>
      <div class="row4">
        <button id="btn1">1</button>
        <button id="btn2">2</button>
        <button id="btn3">3</button>
        <button id="additionbtn">+</button>
      </div>
      <div class="row5">
        <button id="doublezerobtn">00</button>
        <button id="zerobtn">0</button>
        <button id="dotbtn">.</button>
        <button id="equalsbtn">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
